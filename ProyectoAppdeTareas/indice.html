<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tareas y/o Trabajos Pendientes</title>
    
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="container">
        <h1>Mis Tareas</h1>
        
        <form id="todo-form" class="input-group">
            <input type="text" id="task-input" placeholder="Escribe una nueva tarea..." required>
            <button type="submit" id="add-btn">Agregar</button>
        </form>

        <ul id="task-list">

        </ul>

        <p class="counter">Tareas pendientes: <span id="task-count">0</span></p>
    </div>

    <script src="dinamico.js"></script>
</body>
</html>
